<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Project - InsightHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">InsightHub</div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="submit.html">Submit Project</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="form">
        <h2>Submit Research Project</h2>
        <p id="error" class="error"></p>
        <p id="success" class="success"></p>

        <input type="text" id="title" placeholder="Project Title"><br>
        <textarea id="abstract" placeholder="Abstract / Description" rows="5"></textarea><br>
        <select id="department">
            <option value="">Select Department</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Business">Business</option>
            <option value="Mathematics">Mathematics</option>
        </select><br>
        <input type="text" id="supervisor" placeholder="Supervisor Name"><br>
        <input type="number" id="year" placeholder="Year of Completion"><br>
        <input type="text" id="tags" placeholder="Tags (e.g. AI, Machine Learning)"><br>
        <input type="text" id="technology" placeholder="Technologies Used (e.g. Python, React)"><br>
        <input type="url" id="file_url" placeholder="Link to Project File (Google Drive, PDF link)"><br>
        <input type="url" id="video_url" placeholder="Video/Demo Link (Optional)"><br>
        <button onclick="submitProject()">Submit Project</button>
    </div>

<script src="script.js"></script>
<script src="submit.js"></script>

</body>
</html>
