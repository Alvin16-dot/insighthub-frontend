<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InsightHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">InsightHub</div>
        <div class="links">
            <span id="nav-user"></span>
            <a href="index.html">Home</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="register.html" id="nav-register">Register</a>
            <a href="submit.html" id="nav-submit" style="display:none">Submit Project</a>
            <a href="admin.html" id="nav-admin" style="display:none">Admin</a>
            <a href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="form">
        <h2>Login</h2>
        <p id="error" class="error"></p>
        <p id="success" class="success"></p>

        <input type="email" id="email" placeholder="Email"><br>
        <input type="password" id="password" placeholder="Password"><br>
        <button onclick="login()">Login</button>

        <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>

<script src="script.js"></script>
<script src="login.js"></script>
</body>
</html>
