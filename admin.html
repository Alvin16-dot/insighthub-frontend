<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - InsightHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">InsightHub</div>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Admin Dashboard</h2>

        <div class="stats">
            <div class="stat-card">
                <h3 id="total-count">0</h3>
                <p>Total Projects</p>
            </div>
            <div class="stat-card">
                <h3 id="pending-count">0</h3>
                <p>Pending</p>
            </div>
            <div class="stat-card">
                <h3 id="approved-count">0</h3>
                <p>Approved</p>
            </div>
            <div class="stat-card">
                <h3 id="rejected-count">0</h3>
                <p>Rejected</p>
            </div>
        </div>

        
        <div class="filter-btns">
            <button onclick="filterProjects('all')" class="active-btn">All</button>
            <button onclick="filterProjects('pending')">Pending</button>
            <button onclick="filterProjects('approved')">Approved</button>
            <button onclick="filterProjects('rejected')">Rejected</button>
        </div>

    
        <div id="admin-projects">
            <p>Loading projects...</p>
        </div>
    </div>

<script src="script.js"></script>
<script src="admin.js"></script>
</body>
</html>
