<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightHub - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">InsightHub</div>
        <div class="links">
            <span id="nav-user"></span>
            <a href="index.html">Home</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="register.html" id="nav-register">Register</a>
            <a href="submit.html" id="nav-submit" style="display:none">Submit Project</a>
            <a href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Research Projects</h2>

        <div class="search-bar">
            <input type="text" id="keyword" placeholder="Search by keyword...">
            <select id="department">
                <option value="">All Departments</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Engineering">Engineering</option>
                <option value="Business">Business</option>
                <option value="Mathematics">Mathematics</option>
            </select>
            <select id="year">
                <option value="">All Years</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
            <button onclick="searchProjects()">Search</button>
            <button onclick="loadProjects()">Clear</button>
        </div>

        <div id="projects-grid" class="projects-grid">
            <p>Loading projects...</p>
        </div>
    </div>

<script src="script.js"></script>
<script src="index.js"></script>
</body>
</html>
