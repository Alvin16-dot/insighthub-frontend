<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightHub - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">InsightHub</div>
        <div class="links">
            <span id="nav-user"></span>
            <a href="index.html">Home</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="register.html" id="nav-register">Register</a>
            <a href="submit.html" id="nav-submit" style="display:none">Submit Project</a>
            <a href="#" id="nav-logout" style="display:none" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Research Projects</h2>

        <div class="search-bar">
            <input type="text" id="keyword" placeholder="Search by keyword...">
            <select id="department">
                <option value="">All Departments</option>
                <option value="Computer Science">Computer Science</option>
                <option value="Engineering">Engineering</option>
                <option value="Business">Business</option>
                <option value="Mathematics">Mathematics</option>
            </select>
            <select id="year">
                <option value="">All Years</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
            <button onclick="searchProjects()">Search</button>
            <button onclick="loadProjects()">Clear</button>
        </div>

        <div id="projects-grid" class="projects-grid">
            <p>Loading projects...</p>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        if (user) {
            document.getElementById('nav-user').textContent = 'Hi, ' + user.name;
            document.getElementById('nav-login').style.display = 'none';
            document.getElementById('nav-register').style.display = 'none';
            document.getElementById('nav-submit').style.display = 'inline';
            document.getElementById('nav-logout').style.display = 'inline';

            if (user.role === 'admin') {
                const adminLink = document.createElement('a');
                adminLink.href = 'admin.html';
                adminLink.textContent = 'Admin';
                document.getElementById('nav-logout').before(adminLink);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function loadProjects() {
            document.getElementById('keyword').value = '';
            document.getElementById('department').value = '';
            document.getElementById('year').value = '';

            fetch('https://insighthub-backend-aqi5.onrender.com/api/projects')
            .then(response => response.json())
            .then(projects => {
                displayProjects(projects);
            })
            .catch(error => {
                console.log('Error:', error);
            });
        }

        function searchProjects() {
            const keyword = document.getElementById('keyword').value;
            const department = document.getElementById('department').value;
            const year = document.getElementById('year').value;

            let url = 'https://insighthub-backend-aqi5.onrender.com/api/projects?';
            if (keyword) url += 'keyword=' + keyword + '&';
            if (department) url += 'department=' + department + '&';
            if (year) url += 'year=' + year + '&';

            fetch(url)
            .then(response => response.json())
            .then(projects => {
                displayProjects(projects);
            })
            .catch(error => {
                console.log('Error:', error);
            });
        }

        function displayProjects(projects) {
            const grid = document.getElementById('projects-grid');

            if (projects.length === 0) {
                grid.innerHTML = '<p>No projects found.</p>';
                return;
            }

            grid.innerHTML = '';
            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.innerHTML = `
                    <h3>${project.title}</h3>
                    <p class="student-name">By: ${project.student_name}</p>
                    <p class="department">${project.department} - ${project.year}</p>
                    <p class="abstract">${project.abstract.substring(0, 150)}...</p>
                    <a href="project.html?id=${project.id}" class="btn">View Project</a>
                `;
                grid.appendChild(card);
            });
        }

        // Load projects when page opens
        loadProjects();
    </script>
</body>
</html>
